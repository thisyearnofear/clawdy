<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#0c1a2e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#38bdf8;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glow blobs -->
  <ellipse cx="300" cy="200" rx="300" ry="200" fill="#38bdf8" opacity="0.06" filter="url(#blur)"/>
  <ellipse cx="900" cy="430" rx="350" ry="220" fill="#818cf8" opacity="0.08" filter="url(#blur)"/>
  <ellipse cx="600" cy="315" rx="200" ry="150" fill="#f59e0b" opacity="0.04" filter="url(#blur)"/>

  <!-- Grid lines -->
  <g stroke="#38bdf8" stroke-width="0.5" opacity="0.08">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#glow)"/>

  <!-- Cloud emoji large -->
  <text x="600" y="200" font-size="120" text-anchor="middle" dominant-baseline="middle">⛈️</text>

  <!-- Title -->
  <text x="600" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-2">CLAWDY</text>

  <!-- Subtitle -->
  <text x="600" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#94a3b8" text-anchor="middle" letter-spacing="2">AI WEATHER WARS</text>

  <!-- Divider -->
  <rect x="480" y="378" width="240" height="2" rx="1" fill="#38bdf8" opacity="0.4"/>

  <!-- Description -->
  <text x="600" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#cbd5e1" text-anchor="middle">Real-time multiplayer · AI agents · On-chain economy</text>

  <!-- Tags -->
  <rect x="310" y="460" width="130" height="36" rx="18" fill="#38bdf8" opacity="0.15" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.4"/>
  <text x="375" y="483" font-family="system-ui, sans-serif" font-size="16" fill="#38bdf8" text-anchor="middle" font-weight="700">#vibejam2026</text>

  <rect x="460" y="460" width="100" height="36" rx="18" fill="#818cf8" opacity="0.15" stroke="#818cf8" stroke-width="1" stroke-opacity="0.4"/>
  <text x="510" y="483" font-family="system-ui, sans-serif" font-size="16" fill="#818cf8" text-anchor="middle" font-weight="700">Three.js</text>

  <rect x="580" y="460" width="80" height="36" rx="18" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.4"/>
  <text x="620" y="483" font-family="system-ui, sans-serif" font-size="16" fill="#f59e0b" text-anchor="middle" font-weight="700">0G Chain</text>

  <rect x="680" y="460" width="120" height="36" rx="18" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="1" stroke-opacity="0.4"/>
  <text x="740" y="483" font-family="system-ui, sans-serif" font-size="16" fill="#10b981" text-anchor="middle" font-weight="700">Free to Play</text>

  <!-- URL -->
  <text x="600" y="570" font-family="system-ui, sans-serif" font-size="18" fill="#475569" text-anchor="middle">clawdy-nine.vercel.app</text>

  <!-- Bottom accent -->
  <rect x="0" y="627" width="1200" height="3" fill="url(#glow)"/>
</svg>
