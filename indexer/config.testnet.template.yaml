name: clawdy-indexer
networks:
  - id: 195 # X Layer Testnet
    contracts:
      - name: WeatherAuction
        address: "0x723e444ee6d7da19fade372f85da06dd849bf1e0"
        handler: src/EventHandlers.ts
        events:
          - event: WeatherChanged(address indexed agent, uint256 amount, uint256 expiresAt, string preset)
      - name: VehicleRent
        address: "0xea88bd6121d181cfd6f60997b4bdd0297ca432fe"
        handler: src/EventHandlers.ts
        events:
          - event: VehicleRented(string indexed vehicleId, address indexed agent, uint256 amount, uint256 minutesCount, uint256 expiresAt, string vehicleType)
